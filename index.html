<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0c">
  <title>ARK STUDIO · Design Studio</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="lib/fabric.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div class="logo"><h1><i class="fas fa-crown"></i> ARK STUDIO</h1></div>
    <div class="action-buttons">
      <button id="saveBtn"><i class="fas fa-save"></i> Save</button>
      <button id="uploadBtn"><i class="fas fa-upload"></i> Upload</button>
      <button id="exportBtn"><i class="fas fa-download"></i> Export</button>
    </div>
  </div>

  <div class="canvas-area">
    <div id="canvas-container">
      <canvas id="design-canvas" width="800" height="1000"></canvas>
    </div>
  </div>

  <button class="floating-icon" id="floatingTrigger"><i class="fas fa-magic"></i></button>

  <div class="tool-drawer" id="toolDrawer">
    <div class="drawer-header">
      <h3><i class="fas fa-sliders-h"></i> Design Studio</h3>
      <button class="close-drawer" id="closeDrawer">✕</button>
    </div>

    <!-- Step 1: Shapes -->
    <div class="step-section">
      <div class="step-title"><i class="fas fa-shapes"></i> 1. CONTAINER SHAPES (50+)</div>
      <div class="shape-grid" id="shapeGrid"></div>
    </div>

    <!-- Step 2: Image -->
    <div class="step-section">
      <div class="step-title"><i class="fas fa-image"></i> 2. FILL WITH IMAGE</div>
      <button id="addImageBtn" class="btn-full"><i class="fas fa-file-image"></i> Add Image to Shape</button>
      <div class="control-group">
        <label>Opacity Gradient Direction</label>
        <select id="opacityDirection">
          <option value="none">None</option><option value="left">Left → Right</option>
          <option value="right">Right → Left</option><option value="top">Top → Bottom</option>
          <option value="bottom">Bottom → Top</option>
        </select>
        <label>Strength</label><input type="range" id="opacityStrength" min="0" max="100" value="50">
      </div>
      <button id="maskLineBtn" class="btn-gold btn-full"><i class="fas fa-draw-polygon"></i> Mask Opacity Line</button>
    </div>

    <!-- Step 3: Typography -->
    <div class="step-section">
      <div class="step-title"><i class="fas fa-font"></i> 3. TYPOGRAPHY</div>
      <button id="addTextBtn" class="btn-full"><i class="fas fa-plus-circle"></i> Add Text</button>
      <div class="control-group"><label>Rotate (0-360°)</label><input type="range" id="textRotate" min="0" max="360" value="0"></div>
      <div class="control-group"><button id="mirrorTextBtn">🪞 Mirror</button><button id="apply3DTextBtn" class="btn-gold">✨ 3D Gradient</button></div>
      <div class="control-group"><label>Bullet Style</label><select id="bulletStyle"><option value="•">• Dot</option><option value="◆">◆ Solid</option><option value="★">★ Star</option><option value="●">● Circle</option></select></div>
      <div class="control-group"><label>Custom Font</label><input type="text" id="customFont" placeholder="Font name"><button id="uploadFontBtn">Upload Font</button></div>
    </div>

    <!-- Step 4: Backdrop -->
    <div class="step-section">
      <div class="step-title"><i class="fas fa-palette"></i> 4. BACKDROP SHADES</div>
      <div class="control-group"><label>Color</label><input type="color" id="shadeColor" value="#1a1a2e"></div>
      <div class="control-group"><label>Strength</label><input type="range" id="shadeStrength" min="0" max="100" value="30"></div>
      <div class="control-group"><label>Opacity Dial (360°)</label><input type="range" id="shadeOpacity" min="0" max="1" step="0.01" value="0.3"></div>
      <button id="applyShadeBtn" class="btn-full">Apply Backdrop</button>
    </div>

    <!-- Step 5: Borders -->
    <div class="step-section">
      <div class="step-title"><i class="fas fa-border-all"></i> 5. BORDERS</div>
      <div class="control-group"><label>Strength (px)</label><input type="range" id="borderWidth" min="0" max="20" value="2"></div>
      <div class="control-group"><label>Color</label><input type="color" id="borderColor" value="#e0b05a"></div>
      <div class="control-group"><label>Type</label><select id="borderType"><option value="solid">Solid</option><option value="dotted">Dotted</option><option value="dashed">Dashed</option></select></div>
      <div class="control-group"><label>Opacity Dial</label><input type="range" id="borderOpacity" min="0" max="1" step="0.01" value="1"></div>
      <button id="applyBorderBtn" class="btn-full">Apply Border</button>
    </div>

    <!-- Step 6: Lines -->
    <div class="step-section">
      <div class="step-title"><i class="fas fa-grip-lines"></i> 6. LINES</div>
      <button id="addLineBtn" class="btn-gold btn-full"><i class="fas fa-plus"></i> Add Line</button>
      <div class="control-group"><label>Line Width</label><input type="range" id="lineWidth" min="1" max="20" value="3"></div>
      <div class="control-group"><label>Line Color</label><input type="color" id="lineColor" value="#ffffff"></div>
      <div class="control-group"><label>Line Type</label><select id="lineType"><option value="solid">Solid</option><option value="dot">Dot</option><option value="dash">Dash</option></select></div>
    </div>

    <!-- Undo/Redo -->
    <div class="step-section">
      <div class="undo-redo-group"><button id="undoBtn" class="btn-half">↩ Undo</button><button id="redoBtn" class="btn-half">↪ Redo</button></div>
    </div>
  </div>

  <div class="status" id="statusMsg">Ready | Offline Mode</div>
</div>

<script src="js/undo-redo.js"></script>
<script src="js/canvas-manager.js"></script>
<script src="js/image-editor.js"></script>
<script src="js/typography.js"></script>
<script src="js/effects.js"></script>
<script src="js/storage.js"></script>
<script src="js/file-upload.js"></script>
<script src="js/app.js"></script>
</body>
</html>
